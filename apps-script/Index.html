<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classic Fireplace ServiceOps</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --surface: #fff;
      --surface-soft: #f5f7fb;
      --border: #e2e8f0;
      --text: #111827;
      --muted: #6b7280;
      --blue: #2563eb;
      --blue-soft: #eef4ff;
      --green: #16a34a;
      --green-soft: #eaf8ef;
      --amber: #b45309;
      --amber-soft: #fff7e6;
      --red: #dc2626;
      --red-soft: #fff1f1;
      --purple: #7c3aed;
      --purple-soft: #f3edff;
      --cyan: #0891b2;
      --cyan-soft: #e6f8fc;
      --nav: #0f172a;
      --nav-soft: #1e293b;
      --nav-muted: #94a3b8;
      --shadow: 0 1px 2px rgba(15,23,42,.06), 0 12px 30px rgba(15,23,42,.08);
      --radius: 14px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
    }
    button, input, select, textarea { font: inherit; }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
    }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 14px 10px;
      background: var(--nav);
      border-right: 1px solid #0b1120;
      color: #f8fafc;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 6px 18px;
      font-weight: 800;
      letter-spacing: -.02em;
    }
    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #1a73e8, #34a853);
      color: white;
      font-weight: 900;
    }
    .brand-subtitle { color: var(--nav-muted); font-size: 12px; font-weight: 600; }
    .nav-button {
      display: block;
      text-decoration: none;
      width: 100%;
      min-height: 36px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 8px 10px;
      text-align: left;
      background: transparent;
      color: #cbd5e1;
      font-weight: 750;
      cursor: pointer;
      box-shadow: none;
      margin-bottom: 5px;
    }
    .nav-button:hover { background: var(--nav-soft); color: #fff; }
    .nav-button.active {
      background: #ffffff;
      color: #0f172a;
    }
    .nav-section-title {
      padding: 16px 10px 7px;
      color: var(--nav-muted);
      font-size: 11px;
      font-weight: 850;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: #e2e8f0;
      font-weight: 750;
    }
    .nav-note {
      margin: 6px 8px 0;
      padding: 10px;
      border: 1px solid rgba(148,163,184,.22);
      border-radius: 10px;
      background: rgba(255,255,255,.06);
      color: var(--nav-muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .workspace {
      min-width: 0;
      padding: 8px 14px 20px;
    }
    .topbar {
      display: none;
      grid-template-columns: minmax(220px, 1fr) auto auto;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    /* CSS SECTION — WEBFORM REQUESTS COMPACT LAYOUT */
    .request-command-header {
      display: grid;
      grid-template-columns: minmax(260px, .55fr) minmax(420px, 1fr);
      gap: 12px;
      align-items: end;
    }
    .request-command-actions {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto auto;
      gap: 8px;
      align-items: center;
    }
    .request-command-actions input {
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 12px;
      outline: 0;
    }
    .sync-line {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }
    /* CSS SECTION — ACTION CHIPS */
    .action-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
      grid-column: 1 / -1;
    }
    .action-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      padding: 6px 10px;
      color: var(--text);
      text-decoration: none;
      font-size: 12px;
      font-weight: 850;
    }
    .action-chip strong {
      min-width: 22px;
      height: 20px;
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      background: var(--surface-soft);
      font-size: 11px;
    }
    .action-chip.active {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: var(--blue);
    }
    .search {
      height: 34px;
      max-width: 680px;
      border-radius: 999px;
      background: #eef2f7;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
    }
    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
    }
    .button {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      padding: 7px 11px;
      font-weight: 750;
      cursor: pointer;
      box-shadow: var(--shadow);
    }
    .button.primary {
      background: var(--blue);
      border-color: var(--blue);
      color: white;
    }
    .hero {
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      padding: 0;
      margin-bottom: 6px;
    }
    .kicker {
      color: #64748b;
      font-size: 10px;
      font-weight: 850;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 1px 0 0;
      font-size: 23px;
      line-height: 1.05;
      letter-spacing: -.03em;
    }
    .subline { margin-top: 2px; color: var(--muted); font-size: 11px; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }
    .toolbar input {
      flex: 1 1 360px;
      min-width: 220px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px 10px;
      outline: 0;
    }
    .status-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 6px;
      margin-bottom: 8px;
    }
    .status-card, .settings-card, .health-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }
    .status-card { padding: 8px 10px; }
    .metric-label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .metric-value { margin-top: 1px; font-size: 17px; font-weight: 900; letter-spacing: -.02em; }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, .42fr);
      gap: 8px;
    }
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .settings-card-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }
    .settings-card h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: -.02em;
    }
    .setting-row {
      display: grid;
      grid-template-columns: minmax(220px, .9fr) minmax(240px, 1fr) 110px;
      gap: 14px;
      align-items: start;
      padding: 10px 14px;
      border-bottom: 1px solid #edf0f5;
    }
    .setting-row:last-child { border-bottom: 0; }
    .setting-name { font-weight: 850; }
    .setting-key {
      margin-top: 3px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--muted);
      font-size: 11px;
    }
    .setting-help { margin-top: 5px; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .setting-control {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      padding: 10px 12px;
      outline: 0;
    }
    textarea.setting-control { min-height: 84px; resize: vertical; }
    .setting-actions { display: flex; gap: 8px; justify-content: flex-end; align-items: center; }
    .save {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 850;
      cursor: pointer;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 10px;
      font-weight: 850;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .chip.configured, .chip.fresh, .chip.ok, .chip.low, .chip.completed, .chip.closed, .chip.done, .chip.approved, .chip.scheduled { background: var(--green-soft); color: var(--green); border-color: #bfe7ca; }
    .chip.missing, .chip.error, .chip.high, .chip.blocked, .chip.escalated, .chip.review, .chip.needs-review { background: var(--red-soft); color: var(--red); border-color: #fecaca; }
    .chip.optional, .chip.unknown, .chip.new, .chip.intake { background: #edf2fa; color: var(--muted); border-color: #d8e0ea; }
    .chip.stale, .chip.warning, .chip.medium, .chip.waiting, .chip.quoted, .chip.customer { background: var(--amber-soft); color: var(--amber); border-color: #f8d88b; }
    .chip.opportunity, .chip.hybrid { background: var(--purple-soft); color: var(--purple); border-color: #ddd0ff; }
    .chip.swo, .chip.ready, .chip.in-progress { background: var(--cyan-soft); color: var(--cyan); border-color: #b8edf6; }
    .health-panel { display: grid; gap: 8px; align-content: start; }
    .health-card { padding: 10px; }
    .health-card h3 { margin: 0 0 7px; font-size: 14px; }
    .list { display: grid; gap: 4px; }
    .list-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid #edf0f5;
    }
    .list-row:last-child { border-bottom: 0; }
    .small { color: var(--muted); font-size: 11px; }
    .issues {
      margin-bottom: 14px;
      border: 1px solid #f7d7d4;
      border-radius: 18px;
      background: var(--red-soft);
      color: var(--red);
      padding: 13px 15px;
      font-weight: 750;
    }
    .empty {
      border: 1px dashed var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,.62);
      padding: 12px;
      color: var(--muted);
    }
    .page-panel {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel-pad { padding: 10px 14px; }
    .integration-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      width: fit-content;
      max-width: 100%;
      margin-bottom: 8px;
      padding: 3px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #eef2f7;
    }
    .integration-tab {
      border: 0;
      border-radius: 9px;
      background: transparent;
      box-shadow: none;
      color: var(--muted);
      cursor: pointer;
      padding: 7px 10px;
      font-weight: 760;
    }
    .integration-tab.active {
      background: #fff;
      color: var(--text);
      box-shadow: 0 1px 2px rgba(15,23,42,.08);
    }
    .integration-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, .36fr);
      gap: 8px;
    }
    .integration-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .integration-card-header {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }
    .integration-card h2,
    .template-card h3 {
      margin: 0;
      letter-spacing: -.02em;
    }
    .integration-form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 10px 12px;
    }
    .integration-field {
      display: grid;
      gap: 6px;
    }
    .integration-field label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin: 0 12px 10px;
      padding: 8px;
      border-radius: 10px;
      background: var(--surface-soft);
    }
    .switch {
      width: 48px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #dfe5ef;
      cursor: pointer;
      padding: 3px;
    }
    .switch span {
      display: block;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: #fff;
      box-shadow: var(--shadow);
    }
    .switch.active { background: var(--green); }
    .switch.active span { transform: translateX(20px); }
    .integration-actions-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 0 12px 12px;
    }
    .integration-side-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 10px;
    }
    .integration-side-card h3 {
      margin: 0 0 10px;
      font-size: 15px;
    }
    .template-section {
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .template-section-header {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .template-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 10px 12px;
    }
    .template-card {
      display: grid;
      gap: 6px;
      border: 1px solid #edf0f5;
      border-radius: 10px;
      background: #fff;
      padding: 9px;
    }
    .template-card input,
    .template-card textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 10px 12px;
      outline: 0;
    }
    .template-card textarea {
      min-height: 94px;
      resize: vertical;
      line-height: 1.45;
    }
    .template-vars {
      padding: 0 18px 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: 420px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: 0 16px 40px rgba(31,41,55,.16);
      padding: 13px 15px;
      font-weight: 750;
      display: none;
      z-index: 10;
    }
    .toast.show { display: block; }
    .request-shell {
      display: grid;
      gap: 8px;
    }
    .request-toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 160px 160px 160px;
      gap: 10px;
      align-items: center;
    }
    .request-toolbar input,
    .request-toolbar select {
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      padding: 0 14px;
      outline: 0;
    }
    .request-table-card {
      border: 1px solid var(--border);
      border-radius: 9px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .request-group {
      border: 1px solid var(--border);
      border-radius: 9px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .request-group + .request-group { margin-top: 8px; }
    .request-group summary {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 42px;
      padding: 8px 12px;
      background: var(--surface-soft);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      list-style: none;
    }
    .request-group summary::-webkit-details-marker { display: none; }
    .request-group-title {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      min-width: 0;
    }
    .request-group-title strong {
      font-size: 15px;
      letter-spacing: -.02em;
    }
    .request-group-title span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }
    .request-group-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: flex-end;
    }
    .request-month-stack {
      display: grid;
      gap: 8px;
    }
    .request-table-head,
    .request-row {
      display: grid;
      grid-template-columns: minmax(210px, 1fr) minmax(280px, 1.35fr) minmax(170px, .8fr) minmax(150px, .72fr) minmax(120px, .55fr);
      gap: 8px;
      align-items: center;
    }
    .request-table-head {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 8px 12px;
      background: var(--surface-soft);
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .request-row {
      color: inherit;
      text-decoration: none;
      width: 100%;
      border: 0;
      border-bottom: 1px solid #edf0f5;
      background: #fff;
      padding: 8px 12px;
      text-align: left;
      cursor: pointer;
      font: inherit;
    }
    .request-row:hover { background: #f8fafd; }
    .request-row:last-child { border-bottom: 0; }
    .request-customer { font-weight: 900; letter-spacing: -.015em; }
    .customer-prefix {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 7px;
      margin-right: 5px;
      font-size: 10px;
      font-weight: 900;
      border: 1px solid #d8e0ea;
      background: #edf2fa;
      color: var(--muted);
    }
    .customer-prefix.known {
      background: var(--green-soft);
      border-color: #bfe7ca;
      color: var(--green);
    }
    .customer-prefix.new {
      background: var(--red-soft);
      border-color: #fecaca;
      color: var(--red);
    }
    .request-meta { margin-top: 2px; color: var(--muted); font-size: 11px; line-height: 1.25; }
    .request-date { margin-top: 2px; color: var(--muted); font-size: 10px; font-weight: 750; }
    .request-issue { font-weight: 850; }
    .request-note {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .stage-stack,
    .record-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }
    .muted-record {
      color: var(--muted);
      font-size: 11px;
    }
    .kanban-board {
      display: grid;
      grid-template-columns: repeat(7, minmax(210px, 1fr));
      gap: 8px;
      align-items: start;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .kanban-lane {
      min-width: 210px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: #eef2f7;
      overflow: hidden;
    }
    .kanban-lane header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      min-height: 50px;
      padding: 8px;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }
    .kanban-lane header span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      margin-top: 2px;
    }
    .kanban-count {
      display: inline-grid;
      place-items: center;
      min-width: 24px;
      height: 24px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--blue);
      font-size: 12px;
      font-weight: 900;
    }
    .kanban-card-list {
      display: grid;
      gap: 6px;
      padding: 7px;
    }
    .kanban-card {
      display: block;
      color: inherit;
      text-decoration: none;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      padding: 8px;
      text-align: left;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(15,23,42,.04);
    }
    .kanban-card:hover {
      border-color: #cbd5e1;
      box-shadow: var(--shadow);
    }
    .kanban-card-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 5px;
    }
    .kanban-card strong {
      display: block;
      line-height: 1.25;
    }
    .kanban-card p {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }
    .kanban-card-meta {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.25;
    }
    .kanban-empty {
      padding: 14px 10px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }
    /* CSS SECTION — KANBAN DETAIL DRAWER */
    .kanban-drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.38);
      z-index: 900;
    }
    .kanban-detail-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(440px, 92vw);
      height: 100vh;
      background: #ffffff;
      z-index: 901;
      box-shadow: -18px 0 45px rgba(15, 23, 42, 0.22);
      transform: translateX(100%);
      transition: transform 180ms ease;
      overflow-y: auto;
      padding: 18px;
    }
    .kanban-detail-drawer.is-open {
      transform: translateX(0);
    }
    /* CSS SECTION — DETAIL PANEL */
    .drawer-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      background: rgba(31,41,55,.22);
      z-index: 20;
    }
    .drawer-backdrop.open { display: block; }
    body.drawer-open { overflow: hidden; }
    .drawer {
      position: absolute;
      top: 0;
      right: 0;
      width: min(520px, 100%);
      height: 100%;
      overflow: auto;
      background: #fff;
      border-left: 1px solid var(--border);
      box-shadow: -18px 0 44px rgba(31,41,55,.16);
      padding: 22px;
    }
    .drawer-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }
    .drawer h2 { margin: 0; font-size: 24px; letter-spacing: -.035em; }
    .drawer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .drawer-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-soft);
      padding: 14px;
    }
    .drawer-card.wide { grid-column: 1 / -1; }
    .drawer-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .drawer-value { line-height: 1.45; white-space: pre-wrap; }
    .detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .detail-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(360px, .36fr);
      gap: 10px;
      align-items: start;
    }
    .server-detail-panel {
      position: sticky;
      top: 8px;
      max-height: calc(100vh - 16px);
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      box-shadow: var(--shadow);
      padding: 12px;
    }
    .ai-suggestions {
      margin-top: 10px;
      border: 1px solid #b8edf6;
      border-radius: 10px;
      background: var(--cyan-soft);
      padding: 10px;
    }
    .ai-suggestions h3 { margin: 2px 0 4px; font-size: 15px; }
    .ai-suggestions p { margin: 0 0 8px; color: #155e75; font-size: 12px; line-height: 1.35; }
    .skeleton {
      min-height: 86px;
      border-radius: 18px;
      background: linear-gradient(90deg, #fff, #eef3fb, #fff);
      background-size: 220% 100%;
      animation: shimmer 1.1s linear infinite;
    }
    @keyframes shimmer { to { background-position: -220% 0; } }
    @media (max-width: 1020px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .topbar, .grid, .setting-row, .status-strip, .request-toolbar, .request-table-head, .request-row, .drawer-grid, .integration-layout, .integration-form, .template-grid, .request-group summary { grid-template-columns: 1fr; }
      .kanban-board { grid-template-columns: 1fr; overflow-x: visible; }
      .kanban-lane { min-width: 0; }
      .request-table-head { display: none; }
      .request-group-stats { justify-content: flex-start; }
    }
  </style>
</head>
<body onload="if (window.bootApp) window.bootApp()">
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">CF</div>
        <div>
          <div>ServiceOps</div>
          <div class="brand-subtitle">Operations Console</div>
        </div>
      </div>
      <a class="nav-button <?= navRequestsClass ?>" id="navRequests" href="<?= appUrl ?>?page=requests" data-action="requests">☰ Webform Requests</a>
      <a class="nav-button <?= navKanbanClass ?>" id="navKanban" href="<?= appUrl ?>?page=kanban" data-action="kanban">▦ Kanban</a>
      <a class="nav-button <?= navIntegrationsClass ?>" id="navIntegrations" href="<?= appUrl ?>?page=integrations" data-action="integrations">🔌 Integrations</a>
      <a class="nav-button <?= navAdminClass ?>" id="navAdmin" href="<?= appUrl ?>?page=admin" data-action="admin">⚙️ Admin Settings</a>
      <div class="nav-section-title">Workspace</div>
      <div class="nav-item"><span>Newest first</span><span class="chip optional" id="bootState">Server</span></div>
      <div class="nav-section-title">Clean slate</div>
      <div class="nav-note">Webform Requests, Kanban, Integrations, and Admin stay read-only unless a gated action is explicitly approved.</div>
    </aside>

    <main class="workspace">
      <div class="topbar">
        <div class="search">
          <span>🔎</span>
          <input id="globalSearch" type="search" placeholder="Search requests, customer, phone, email, city, issue..." oninput="handleGlobalSearch(this.value)">
        </div>
        <a class="button" id="topReload" href="<?= appUrl ?>?page=<?= initialPage ?>" data-action="reload">Reload</a>
        <button class="button primary" id="topRefreshData" type="button" data-action="refresh" onclick="runMaintenance('refreshStaleDataWithLog')">Refresh Data</button>
      </div>

      <section class="hero" id="hero">
        <?!= initialHeroMarkup ?>
      </section>

      <section class="status-strip" id="statusStrip">
        <?!= initialStatusMarkup ?>
      </section>

      <div id="issues"></div>
      <section class="<?= initialMainClass ?>" id="mainGrid">
        <?!= initialMainMarkup ?>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>
  <div class="drawer-backdrop" id="requestDrawerBackdrop" onclick="closeRequestDrawer()">
    <aside class="drawer" id="requestDrawer" onclick="event.stopPropagation()"></aside>
  </div>
  <!-- HTML SECTION — KANBAN DETAIL DRAWER -->
  <div id="kanbanDrawerBackdrop" class="kanban-drawer-backdrop" hidden></div>
  <aside
    id="kanbanDetailDrawer"
    class="kanban-detail-drawer"
    aria-hidden="true"
    role="dialog"
    aria-label="Request details"
  ></aside>

  <script>
    const perfStart = performance.now();
    let adminData = null;
    let settingsCatalog = null;
    let requestsData = null;
    let kanbanData = <?!= initialKanbanJson ?>;
    let filterText = "";
    let requestFilterText = "";
    let kanbanFilterText = "";
    let activePage = "<?= initialPage ?>";
    let activeIntegration = "striven";
    let showIntegrationSecrets = false;
    let requestGroupState = {};
    let bootStarted = false;
    let requestsLoadToken = 0;
    let kanbanLoadToken = 0;
    // JAVASCRIPT SECTION — WEBFORM REQUESTS STATE
    const state = {
      requests: <?!= initialRequestsJson ?>,
      filteredRequests: [],
      activeFilter: "all",
      searchQuery: "",
      selectedRequestId: null,
      lastRefreshAt: null,
      isRefreshing: false
    };
    // JAVASCRIPT SECTION — KANBAN DRAWER STATE
    state.selectedKanbanCardId = null;
    state.isKanbanDrawerOpen = false;
    let searchTimer = null;

    window.onerror = function(message) {
      showShellError("Client error: " + message);
    };

    document.addEventListener("DOMContentLoaded", () => safeRun(bootApp, "open ServiceOps"));
    document.addEventListener("click", (event) => {
      const filterTarget = event.target && event.target.closest ? event.target.closest("[data-filter]") : null;
      if (filterTarget) {
        event.preventDefault();
        state.activeFilter = filterTarget.getAttribute("data-filter") || "all";
        renderRequestsPage();
        return;
      }
      const detailTarget = event.target && event.target.closest ? event.target.closest("[data-detail='request']") : null;
      if (detailTarget) {
        event.preventDefault();
        safeRun(() => openInlineRequestDetail(detailTarget.getAttribute("data-payload")), "open request detail");
        return;
      }
      const kanbanCardTarget = event.target && event.target.closest ? event.target.closest("[data-kanban-card-id]") : null;
      if (kanbanCardTarget) {
        event.preventDefault();
        safeRun(() => openKanbanDrawer(kanbanCardTarget.getAttribute("data-kanban-card-id")), "open Kanban detail");
        return;
      }
      const target = event.target && event.target.closest ? event.target.closest("[data-action]") : null;
      if (!target) return;
      event.preventDefault();
      const action = target.getAttribute("data-action");
      const value = target.getAttribute("data-value");
      safeRun(() => runUiAction(action, value), action);
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeRequestDrawer();
        closeKanbanDrawer();
      }
    });
    document.addEventListener("DOMContentLoaded", () => {
      const kanbanBackdrop = document.getElementById("kanbanDrawerBackdrop");
      if (kanbanBackdrop) kanbanBackdrop.addEventListener("click", closeKanbanDrawer);
    });

    function bootApp() {
      if (bootStarted) return;
      bootStarted = true;
      bindUiEvents();
      const bootState = document.getElementById("bootState");
      if (bootState) {
        bootState.textContent = runtimeReady() ? "Live" : "Demo";
        bootState.className = "chip configured";
      }
      normalizeRequestState();
      if (activePage === "kanban") {
        renderKanbanPage();
      } else if (activePage === "integrations") {
        renderIntegrationsPage();
      } else if (activePage === "admin") {
        renderAdminPage();
      } else {
        renderRequestsPage();
      }
    }

    function bindUiEvents() {
      bindClick("navRequests", showRequestsPage);
      bindClick("navKanban", showKanbanPage);
      bindClick("navIntegrations", showIntegrationsPage);
      bindClick("navAdmin", showAdminPage);
      bindClick("topReload", reloadAll);
      bindClick("topRefreshData", () => runMaintenance("refreshStaleDataWithLog"));
      bindInput("globalSearch", (event) => handleGlobalSearch(event.target.value));
    }

    function bindClick(id, handler) {
      const el = document.getElementById(id);
      if (!el || el.dataset.bound === "true") return;
      el.dataset.bound = "true";
      el.addEventListener("click", (event) => {
        event.preventDefault();
        safeRun(handler, id);
      });
    }

    function bindInput(id, handler) {
      const el = document.getElementById(id);
      if (!el || el.dataset.bound === "true") return;
      el.dataset.bound = "true";
      el.addEventListener("input", handler);
    }

    function runUiAction(action, value) {
      const actions = {
        requests: showRequestsPage,
        kanban: showKanbanPage,
        integrations: showIntegrationsPage,
        admin: showAdminPage,
        reload: reloadAll,
        refresh: () => runMaintenance("refreshStaleDataWithLog"),
        reloadRequests: loadRequests,
        reloadKanban: loadKanban,
        closeDrawer: closeRequestDrawer,
        testIntegrations: () => runMaintenance("testIntegrationHealth"),
        forceRefresh: () => runMaintenance("forceFullRefreshWithLog"),
        toggleSecrets: toggleIntegrationSecrets,
        selectIntegration: () => selectIntegration(value),
        toast: () => toast(value || "")
      };
      if (actions[action]) actions[action]();
    }

    function reloadAll() {
      if (activePage === "requests") {
        loadRequests();
        renderRequestsPage();
        return;
      }
      if (activePage === "kanban") {
        loadKanban();
        renderKanbanPage();
        return;
      }
      if (activePage === "integrations") {
        loadAdminData();
        renderIntegrationsPage();
        return;
      }
      loadAdminData();
      loadSettings();
      renderAdminPage();
    }

    function setActiveNav(id) {
      ["navRequests", "navKanban", "navIntegrations", "navAdmin"].forEach((navId) => {
        const el = document.getElementById(navId);
        if (el) el.classList.toggle("active", navId === id);
      });
    }

    function showRequestsPage() {
      safeRun(() => {
        activePage = "requests";
        setActiveNav("navRequests");
        renderRequestsPage();
        if (!requestsData) loadRequests();
      }, "open Webform Requests");
    }

    function showKanbanPage() {
      safeRun(() => {
        activePage = "kanban";
        setActiveNav("navKanban");
        renderKanbanPage();
        if (!kanbanData) loadKanban();
      }, "open Kanban");
    }

    function showAdminPage() {
      safeRun(() => {
        activePage = "admin";
        setActiveNav("navAdmin");
        renderAdminPage();
        if (!adminData) loadAdminData();
        if (!settingsCatalog) loadSettings();
      }, "open Admin");
    }

    function showIntegrationsPage() {
      safeRun(() => {
        activePage = "integrations";
        setActiveNav("navIntegrations");
        renderIntegrationsPage();
        if (!adminData) loadAdminData();
      }, "open Integrations");
    }

    function handleGlobalSearch(value) {
      if (activePage === "admin") {
        filterSettings(value);
        return;
      }
      if (activePage === "requests") {
        queueRequestSearch(value);
        return;
      }
      if (activePage === "kanban") {
        kanbanFilterText = String(value || "").toLowerCase().trim();
        renderKanbanPage();
        return;
      }
      requestFilterText = String(value || "").toLowerCase().trim();
      if (activePage === "integrations") renderIntegrationsPage();
    }

    function loadAdminData() {
      if (!runtimeReady()) {
        renderAdminData(demoAdminData());
        toast("Apps Script runtime not detected. Showing local demo status.");
        return;
      }
      google.script.run
        .withSuccessHandler((data) => {
          if (!data || data.ok === false) {
            toast((data && (data.error || data.message)) || "Admin data failed to load.");
            renderAdminData(demoAdminData());
            return;
          }
          renderAdminData(data);
        })
        .withFailureHandler((err) => {
          toast("Admin data failed: " + errorMessage(err));
          renderAdminData(demoAdminData());
        })
        .getAdminData();
    }

    function loadSettings() {
      const target = document.getElementById("settingsContent");
      if (target) target.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
      if (!runtimeReady()) {
        settingsCatalog = demoSettings();
        renderSettings();
        return;
      }
      google.script.run
        .withSuccessHandler((data) => {
          if (!data || data.ok === false) {
            toast((data && (data.error || data.message)) || "Settings failed to load.");
            settingsCatalog = demoSettings();
          } else {
            settingsCatalog = data;
          }
          renderSettings();
        })
        .withFailureHandler((err) => {
          toast("Settings failed: " + errorMessage(err));
          settingsCatalog = demoSettings();
          renderSettings();
        })
        .getAdminSettingsCatalog();
    }

    function loadRequests() {
      // JAVASCRIPT SECTION — WEBFORM REQUESTS DATA LOAD
      const token = ++requestsLoadToken;
      if (!runtimeReady()) {
        requestsData = demoRequests();
        state.requests = dedupeRequests(requestsData.rows || []);
        state.lastRefreshAt = new Date().toISOString();
        normalizeRequestState();
        if (activePage === "requests") renderRequestsPage();
        return;
      }
      state.isRefreshing = true;
      setTimeout(() => {
        if (token === requestsLoadToken && !requestsData && activePage === "requests") {
          showShellError("Requests are still loading from Apps Script. The server call is taking longer than expected; try Reload Requests, or use Refresh Data to rebuild the sheet cache.");
        }
      }, 9000);
      google.script.run
        .withSuccessHandler((data) => {
          if (token !== requestsLoadToken) return;
          if (!data || data.ok === false) {
            toast((data && (data.error || data.message)) || "Requests failed to load.");
            requestsData = { ok: false, rows: [], generatedAt: new Date().toISOString(), source: "error", error: (data && (data.error || data.message)) || "Requests failed to load." };
          } else {
            requestsData = data;
            state.requests = dedupeRequests(data.rows || []);
            state.lastRefreshAt = data.generatedAt || new Date().toISOString();
            state.isRefreshing = false;
            normalizeRequestState();
          }
          if (activePage === "requests") renderRequestsPage();
        })
        .withFailureHandler((err) => {
          if (token !== requestsLoadToken) return;
          toast("Requests failed: " + errorMessage(err));
          requestsData = { ok: false, rows: [], generatedAt: new Date().toISOString(), source: "error", error: errorMessage(err) };
          state.isRefreshing = false;
          if (activePage === "requests") renderRequestsPage();
        })
        .getWebformRequestsData();
    }

    function loadKanban() {
      const token = ++kanbanLoadToken;
      if (!runtimeReady()) {
        kanbanData = demoKanbanData();
        if (activePage === "kanban") renderKanbanPage();
        return;
      }
      setTimeout(() => {
        if (token === kanbanLoadToken && !kanbanData && activePage === "kanban") {
          showShellError("Kanban is still loading from Apps Script. The server call is taking longer than expected; try Reload Kanban after Requests finish.");
        }
      }, 12000);
      google.script.run
        .withSuccessHandler((data) => {
          if (token !== kanbanLoadToken) return;
          if (!data || data.ok === false) {
            toast((data && (data.error || data.message)) || "Kanban data failed to load.");
            kanbanData = { ok: false, lanes: [], counts: {}, generatedAt: new Date().toISOString(), source: "error", error: (data && (data.error || data.message)) || "Kanban data failed to load." };
          } else {
            kanbanData = data;
          }
          if (activePage === "kanban") renderKanbanPage();
        })
        .withFailureHandler((err) => {
          if (token !== kanbanLoadToken) return;
          toast("Kanban data failed: " + errorMessage(err));
          kanbanData = { ok: false, lanes: [], counts: {}, generatedAt: new Date().toISOString(), source: "error", error: errorMessage(err) };
          if (activePage === "kanban") renderKanbanPage();
        })
        .getKanbanData();
    }

    function renderAdminData(data) {
      adminData = data;
      if (activePage === "integrations") {
        renderIntegrationsPage();
        return;
      }
      if (activePage !== "admin") return;
      const freshness = data.freshness || [];
      const sheets = data.sheetStatus || [];
      const integrations = data.integrationHealth || [];
      const issues = data.issues || [];
      document.getElementById("statusStrip").innerHTML = `
        <div class="status-card"><div class="metric-label">Version</div><div class="metric-value">${escapeHtml((data.version && data.version.tag) || "Unknown")}</div><div class="small">${escapeHtml((data.version && data.version.environment) || "Production")}</div></div>
        <div class="status-card"><div class="metric-label">Data Freshness</div><div class="metric-value">${countBy(freshness, "status", "Fresh")}/${freshness.length || 0}</div><div class="small">fresh datasets</div></div>
        <div class="status-card"><div class="metric-label">Sheets</div><div class="metric-value">${countBy(sheets, "status", "Found")}/${sheets.length || 0}</div><div class="small">required sheets found</div></div>
        <div class="status-card"><div class="metric-label">Load</div><div class="metric-value">${Math.round(performance.now() - perfStart)}ms</div><div class="small">client shell ready</div></div>
      `;
      document.getElementById("issues").innerHTML = issues.length
        ? `<div class="issues">Issues detected: ${issues.map((issue) => escapeHtml(issue.title || issue.description || String(issue))).join(" · ")}</div>`
        : "";
      renderList("freshnessList", freshness, (item) => `
        <div class="list-row"><div><strong>${escapeHtml(item.label)}</strong><div class="small">Age ${item.ageMinutes == null ? "unknown" : item.ageMinutes + " min"} · max ${item.maxMinutes || "n/a"} min</div></div><span class="chip ${statusClass(item.status)}">${escapeHtml(item.status)}</span></div>
      `);
      renderList("sheetList", sheets, (item) => `
        <div class="list-row"><div><strong>${escapeHtml(item.name || item.sheet || item.label)}</strong><div class="small">${escapeHtml(item.lastChecked || item.guidance || "")}</div></div><span class="chip ${statusClass(item.status)}">${escapeHtml(item.status)}</span></div>
      `);
      renderList("integrationList", integrations, (item) => `
        <div class="list-row"><div><strong>${escapeHtml(item.name)}</strong><div class="small">${escapeHtml(item.message || item.lastSuccessfulCall || "")}</div></div><span class="chip ${statusClass(item.status)}">${escapeHtml(item.status)}</span></div>
      `);
      if (activePage === "integrations") renderIntegrationsPage();
    }

    // JAVASCRIPT SECTION — SEARCH AND FILTERS
    function normalizeRequestState() {
      state.requests = dedupeRequests(state.requests || []);
      const query = String(state.searchQuery || "").trim().toLowerCase();
      state.filteredRequests = state.requests.filter((row) => requestMatchesFilter(row, state.activeFilter) && (!query || requestSearchText(row).includes(query)));
    }

    function queueRequestSearch(value) {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        state.searchQuery = String(value || "");
        renderRequestsPage();
      }, 180);
    }

    function renderActionChips() {
      const chips = [
        ["all", "All", state.requests.length],
        ["needs_customer", "Needs Customer", state.requests.filter((row) => !row.strivenCustomerId && !row.customerId).length],
        ["ready_opportunity", "Ready for Opportunity", state.requests.filter((row) => (row.strivenCustomerId || row.customerId) && !(row.strivenOppId || row.opportunityId) && !row.lastError).length],
        ["ready_work_order", "Ready for Work Order", state.requests.filter((row) => (row.strivenOppId || row.opportunityId) && !(row.strivenSoId || row.salesOrderId || row.swoNumber) && !row.lastError).length],
        ["errors", "Has Errors", state.requests.filter((row) => row.lastError || row.derivedStatus === "Error").length],
        ["high_risk", "High Risk", state.requests.filter((row) => (row.riskLevel || row.risk) === "High").length],
        ["today", "Today", state.requests.filter((row) => isRecentRequest(row, 1)).length],
        ["last7", "Last 7 Days", state.requests.filter((row) => isRecentRequest(row, 7)).length]
      ];
      return `<!-- HTML SECTION — ACTION FILTER CHIPS --><div class="action-chip-row">${chips.map(([key, label, count]) => `<button class="action-chip ${state.activeFilter === key ? "active" : ""}" type="button" data-filter="${key}"><span>${escapeHtml(label)}</span><strong>${count}</strong></button>`).join("")}</div>`;
    }

    function requestMatchesFilter(row, filter) {
      if (filter === "needs_customer") return !(row.strivenCustomerId || row.customerId);
      if (filter === "ready_opportunity") return (row.strivenCustomerId || row.customerId) && !(row.strivenOppId || row.opportunityId) && !row.lastError;
      if (filter === "ready_work_order") return (row.strivenOppId || row.opportunityId) && !(row.strivenSoId || row.salesOrderId || row.swoNumber) && !row.lastError;
      if (filter === "errors") return row.lastError || row.derivedStatus === "Error";
      if (filter === "high_risk") return (row.riskLevel || row.risk) === "High";
      if (filter === "today") return isRecentRequest(row, 1);
      if (filter === "last7") return isRecentRequest(row, 7);
      return true;
    }

    function requestSearchText(row) {
      return (row.searchText || [
        row.customerName, row.fullName, row.customer, row.phone, row.altPhone, row.email, row.city, row.postalCode,
        row.issue, row.details, row.anythingElse, row.requestId, row.id, row.strivenCustomerId, row.customerId,
        row.strivenOppId, row.opportunityId, row.strivenSoId, row.salesOrderId, row.salesOrderNumber, row.swoNumber
      ].join(" ")).toLowerCase();
    }

    function isRecentRequest(row, days) {
      const stamp = requestTimestamp(row);
      if (!stamp) return false;
      return stamp >= Date.now() - ((days - 1) * 86400000);
    }

    function dedupeRequests(rows) {
      const best = {};
      (rows || []).forEach((row) => {
        const key = requestDedupeKey(row);
        if (!best[key] || compareRequests(row, best[key]) > 0) best[key] = row;
      });
      return Object.keys(best).map((key) => best[key]).sort((a, b) => requestTimestamp(b) - requestTimestamp(a));
    }

    function requestDedupeKey(row) {
      if (row.requestId || row.id) return "id:" + String(row.requestId || row.id).toLowerCase();
      if (row.sheetRow || row.rowNumber) return "row:" + String(row.sheetRow || row.rowNumber);
      return ["fallback", row.submittedAt, row.email, row.phone, row.street, row.city, row.postalCode].join("|").toLowerCase().replace(/[^a-z0-9|]/g, "");
    }

    function compareRequests(a, b) {
      const score = requestCompleteness(a) - requestCompleteness(b);
      return score || (requestTimestamp(a) - requestTimestamp(b));
    }

    function requestCompleteness(row) {
      return [row.strivenCustomerId || row.customerId, row.strivenOppId || row.opportunityId, row.strivenSoId || row.salesOrderId || row.swoNumber, row.phone, row.email, row.street || row.city || row.postalCode, row.details].filter(Boolean).length;
    }

    function renderGroupStats(group) {
      const highRisk = group.rows.filter((row) => row.risk === "High").length;

        acc[status] = (acc[status] || 0) + 1;
        return acc;
      }, {});
      const topStatuses = Object.keys(statuses)
        .sort((a, b) => statuses[b] - statuses[a])
        .slice(0, 3)
        .map((status) => `<span class="chip ${statusClass(status)}">${escapeHtml(status)} ${statuses[status]}</span>`)
        .join("");
      return `
        ${highRisk ? `<span class="chip missing">High ${highRisk}</span>` : ""}

    function groupRequestsByDate(rows) {
      const now = new Date();
      const todayStart = startOfDay(now).getTime();
      const yesterdayStart = todayStart - 86400000;
      const sevenStart = todayStart - (6 * 86400000);
      const thirtyStart = todayStart - (29 * 86400000);
      const groupMap = {
        today: { key: "today", label: "Today", rows: [], defaultOpen: true, sortValue: 9000000000000 },
        yesterday: { key: "yesterday", label: "Yesterday", rows: [], defaultOpen: true, sortValue: 8000000000000 },
        last7: { key: "last7", label: "Last 7 Days", rows: [], defaultOpen: true, sortValue: 7000000000000 },
        last30: { key: "last30", label: "Last 30 Days", rows: [], defaultOpen: false, sortValue: 6000000000000 }
      };
      const order = ["today", "yesterday", "last7", "last30"];
      function addGroup(key, label, defaultOpen, sortValue) {
        if (!groupMap[key]) {
          groupMap[key] = { key, label, rows: [], defaultOpen, sortValue };
          order.push(key);
        }
        return groupMap[key];
      }
      rows.forEach((row) => {
        const stamp = requestTimestamp(row);
        let key = "unknown";
        let label = "No date captured";
        let defaultOpen = false;
        let sortValue = -1;
        if (stamp) {
          const date = new Date(stamp);
          const dayStart = startOfDay(date).getTime();
          if (dayStart >= todayStart) {
            key = "today";
            label = "Today";
            defaultOpen = true;
            sortValue = 9000000000000;
          } else if (dayStart >= yesterdayStart) {
            key = "yesterday";
            label = "Yesterday";
            defaultOpen = true;
            sortValue = 8000000000000;
          } else if (dayStart >= sevenStart) {
            key = "last7";
            label = "Last 7 Days";
            defaultOpen = true;
            sortValue = 7000000000000;
          } else if (dayStart >= thirtyStart) {
            key = "last30";
            label = "Last 30 Days";
            defaultOpen = false;
            sortValue = 6000000000000;
          } else {
            key = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
            label = date.toLocaleDateString([], { month: "long", year: "numeric" });
            defaultOpen = false;
            sortValue = new Date(date.getFullYear(), date.getMonth(), 1).getTime();
          }
        }
        addGroup(key, label, defaultOpen, sortValue).rows.push(row);
      });
      return order
        .map((key) => groupMap[key])
        .sort((a, b) => b.sortValue - a.sortValue)
        .map((group) => ({ ...group, rows: group.rows.sort((a, b) => requestTimestamp(b) - requestTimestamp(a)) }));
    }

    function requestTimestamp(row) {
      if (row && Number(row.sortTime)) return Number(row.sortTime);
      const stamp = Date.parse((row && row.submittedAt) || "");
      return Number.isNaN(stamp) ? 0 : stamp;
    }

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function formatRequestDate(row) {
      const stamp = requestTimestamp(row);
      if (!stamp) return row.submittedAt || "No submitted date";
      const date = new Date(stamp);
      return date.toLocaleString([], { month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit" });
    }

    function formatKanbanDate(value) {
      const date = new Date(value || "");
      if (Number.isNaN(date.getTime())) return value || "";
      return date.toLocaleString([], { month: "short", day: "numeric", year: "numeric" });
    }

    function maskFieldValue(value) {
      const text = String(value || "");
      if (!text) return "";
      if (text.length <= 4) return "****";
      return "********" + text.slice(-4);
    }

    function shortTime(value) {
      if (!value) return "Now";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "Now";
      return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function renderList(id, items, renderer) {
      const target = document.getElementById(id);
      target.innerHTML = items && items.length ? items.map(renderer).join("") : '<div class="empty">No data available.</div>';
    }

    function countBy(items, key, value) {
      return (items || []).filter((item) => item && item[key] === value).length;
    }

    function statusClass(value) {
      const text = String(value || "").toLowerCase();
      if (/approved for swo|swo gate/.test(text)) return "swo";
      if (/ready|in progress|active|service work order created/.test(text)) return "ready";
      if (/configured|fresh|found|ok|healthy|current|low/.test(text)) return "configured";
      if (/scheduled/.test(text)) return "scheduled";
      if (/completed|closed|done/.test(text)) return "completed";
      if (/review|missing|error|failed|blocked|escalated|high/.test(text)) return "missing";
      if (/stale|warning|waiting|medium|quoted|customer/.test(text)) return "warning";
      if (/opportunity/.test(text)) return "opportunity";
      if (/new|intake/.test(text)) return "intake";
      if (/unknown/.test(text)) return "unknown";
      return "optional";
    }

    function sourceClass(value) {
      const text = String(value || "").toLowerCase();
      if (text === "hybrid") return "hybrid";
      if (text === "opportunity") return "opportunity";
      return "intake";
    }

    function runtimeReady() {
      return Boolean(window.google && google.script && google.script.run);
    }

    function toast(message) {
      const el = document.getElementById("toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => el.classList.remove("show"), 4500);
    }

    function errorMessage(err) {
      return (err && (err.message || err.toString && err.toString())) || String(err || "Unknown error");
    }

    function safeRun(fn, label) {
      try {
        return fn();
      } catch (error) {
        showShellError(`${label || "Action"} failed: ${errorMessage(error)}`);
        return null;
      }
    }

    function showShellError(message) {
      const text = errorMessage(message);
      const issues = document.getElementById("issues");
      if (issues) {
        issues.innerHTML = `<div class="issues">${escapeHtml(text)}</div>`;
      }
      const main = document.getElementById("mainGrid");
      if (main && !main.innerHTML.trim()) {
        main.className = "request-shell";
        main.innerHTML = `<div class="empty">${escapeHtml(text)} Try Reload, or hard-refresh this browser tab.</div>`;
      }
      const toastEl = document.getElementById("toast");
      if (toastEl) {
        toastEl.textContent = text;
        toastEl.classList.add("show");
      }
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value).replace(/[&<>"]/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[ch]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/'/g, "&#39;");
    }
